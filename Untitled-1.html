<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalShare - Pro Edition</title>
    <style>
        /* --- CSS Variables & Professional Xbox Theme --- */
        :root[data-theme="dark"] {
            --bg-base: #020502;
            --bg-surface: #0a0e0a;
            --bg-elevated: #111a11;
            --bg-hover: rgba(16, 124, 16, 0.15);
            --text-main: #f0faf0;
            --text-muted: #6b8e6b;
            --accent: #107c10;
            --accent-hover: #169b16;
            --border: #1d2b1d;
            --shadow: rgba(0, 0, 0, 0.8);
            --danger: #cc0000;
            --success: #28e028;
            /* Skull & Gear Colors */
            --skull-fill: #28e028;
            --socket-color: #020502;
            --outline-color: #000000;
            --glow: 0 0 15px rgba(16, 124, 16, 0.4);
        }

        :root[data-theme="light"] {
            --bg-base: #e2e8f0;
            --bg-surface: #f8fafc;
            --bg-elevated: #f1f5f9;
            --bg-hover: rgba(16, 124, 16, 0.08);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #107c10;
            --accent-hover: #0d630d;
            --border: #cbd5e1;
            --shadow: rgba(0, 0, 0, 0.1);
            --danger: #ef4444;
            --success: #10b981;
            --skull-fill: #107c10;
            --socket-color: #ffffff;
            --outline-color: #0f172a;
            --glow: none;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-base);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            transition: background 0.3s ease, color 0.3s ease;
            -webkit-font-smoothing: antialiased;
        }

        /* Gear Animation Keyframes */
        @keyframes gear-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes gear-spin-reverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }

        .gear-svg { transform-origin: center; pointer-events: none; }
        .gear-spinning { animation: gear-spin 10s linear infinite; }
        .gear-spinning-reverse { animation: gear-spin-reverse 5s linear infinite; }

        /* Copy Button Animation */
        @keyframes pulse-success {
            0% { transform: scale(1); color: var(--text-muted); }
            50% { transform: scale(1.4); color: var(--success); filter: drop-shadow(0 0 12px var(--success)); }
            100% { transform: scale(1); color: var(--text-muted); }
        }
        .animate-copy { animation: pulse-success 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* Skull Animation Styles */
        .skull-path, .eye-path { transition: d 0.9s cubic-bezier(0.4, 0, 0.2, 1); }
        .skull-anim { width: 100%; height: 100%; filter: drop-shadow(0 0 3px var(--skull-fill)); pointer-events: none; }

        button, input, textarea { font-family: inherit; color: inherit; }
        button:focus-visible { outline: 1px solid var(--accent); outline-offset: 1px; }

        /* --- Sidebar --- */
        .sidebar {
            width: 260px;
            background: var(--bg-surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .header-brand {
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
        }

        .brand-icon {
            width: 36px; height: 36px;
            background: radial-gradient(circle, #2ce62c 0%, #107c10 100%);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            padding: 8px;
            flex-shrink: 0;
            box-shadow: 0 0 10px rgba(16, 124, 16, 0.5);
        }
        .brand-name { font-size: 16px; font-weight: 700; letter-spacing: -0.2px; }

        .self-device {
            padding: 12px; margin: 12px;
            background: var(--bg-elevated);
            border-radius: 8px;
            border: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        
        .self-label { font-size: 9px; text-transform: uppercase; color: var(--text-muted); font-weight: 800; letter-spacing: 0.5px; }
        .self-name { font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 6px; }
        .status-dot { width: 6px; height: 6px; background: var(--success); border-radius: 50%; box-shadow: 0 0 6px var(--success); }
        
        .icon-btn { 
            background: transparent; border: none; color: var(--text-muted); 
            cursor: pointer; width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
            position: relative;
        }
        .icon-btn:hover:not(:disabled) { background: var(--bg-hover); color: var(--success); }
        .icon-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .toolbar { padding: 0 12px 12px; }
        .btn-toolbar {
            width: 100%; padding: 8px; background: var(--bg-base); border: 1px solid var(--border);
            border-radius: 16px; cursor: pointer; font-size: 11px; font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .btn-toolbar:hover:not(:disabled) { border-color: var(--success); color: var(--success); }

        .peer-list-container { flex: 1; overflow-y: auto; padding: 0 12px; }
        .section-header { font-size: 9px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin: 12px 6px 6px; letter-spacing: 1px; }
        
        .peer-item {
            padding: 10px; border-radius: 8px; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; gap: 10px; border: 1px solid transparent;
            margin-bottom: 2px;
        }
        .peer-item:hover { background: var(--bg-hover); }
        .peer-item.active { background: var(--bg-elevated); border-color: var(--success); box-shadow: var(--glow); }
        
        .peer-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: white; flex-shrink: 0; font-size: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .peer-info { flex: 1; overflow: hidden; }
        .peer-name { font-weight: 500; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .peer-ip { font-size: 10px; color: var(--text-muted); font-family: ui-monospace, SFMono-Regular, monospace; }

        /* --- Main Area --- */
        .main-area { flex: 1; display: flex; flex-direction: column; position: relative; background: radial-gradient(circle at center, #0a140a 0%, #010401 100%); }

        .chat-header {
            padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex;
            align-items: center; justify-content: space-between; background: var(--bg-surface);
        }
        .chat-title-text h2 { font-size: 15px; font-weight: 700; color: var(--success); }
        .chat-title-text span { font-size: 10px; color: var(--text-muted); font-family: monospace; }
        .header-actions { display: flex; gap: 8px; }

        .chat-history { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
        
        /* BIGGER Incoming Message Animation */
        @keyframes chatPopIn {
            0% { 
                opacity: 0; 
                transform: scale(0.5) translateY(60px); /* More travel and smaller start */
                filter: brightness(3) blur(2px);
            }
            60% {
                transform: scale(1.15) translateY(-10px); /* Larger overshoot */
                filter: brightness(1.5);
            }
            85% {
                transform: scale(0.95);
            }
            100% { 
                opacity: 1; 
                transform: scale(1) translateY(0);
                filter: brightness(1) blur(0);
            }
        }

        /* BIGGER Glowing Effect */
        @keyframes intenseGlow {
            0%, 100% { 
                box-shadow: 0 0 8px rgba(40, 224, 40, 0.2), inset 0 0 4px rgba(40, 224, 40, 0.1); 
            }
            50% { 
                box-shadow: 0 0 25px rgba(40, 224, 40, 0.5), inset 0 0 10px rgba(40, 224, 40, 0.2); 
                border-color: var(--success);
            }
        }

        .msg-bubble { 
            max-width: 80%; 
            animation: chatPopIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            transform-origin: bottom center;
        }
        
        .msg-inner {
            background: var(--bg-elevated); padding: 10px 14px; border-radius: 12px;
            border: 1px solid var(--border); position: relative; line-height: 1.4;
            overflow: hidden;
            animation: intenseGlow 4s infinite ease-in-out;
        }

        .msg-bubble.sent .msg-inner { 
            background: var(--accent); 
            border-color: var(--success); 
            color: #fff; 
            border-bottom-right-radius: 2px; 
            animation: intenseGlow 2.5s infinite ease-in-out;
        }
        .msg-bubble.received .msg-inner { border-bottom-left-radius: 2px; }
        
        /* Media Previews */
        .media-preview {
            max-width: 100%;
            border-radius: 8px;
            display: block;
            margin-bottom: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: #000;
        }
        .media-preview.image { cursor: pointer; }
        .msg-bubble.sent .media-preview { border-color: var(--success); }

        .msg-text { font-size: 13px; font-weight: 400; }
        .msg-meta { font-size: 9px; color: var(--text-muted); margin-top: 6px; text-align: right; font-family: monospace; }

        /* --- Composer --- */
        .composer { padding: 12px 20px; border-top: 1px solid var(--border); background: var(--bg-surface); }
        .composer-box { 
            display: flex; gap: 8px; align-items: flex-end; background: var(--bg-base); 
            padding: 8px 12px; border-radius: 20px; border: 1px solid var(--border); transition: 0.2s; 
        }
        .composer-box.disabled { opacity: 0.6; }
        .composer-box:focus-within { border-color: var(--success); }
        
        .composer-input { 
            flex: 1; background: transparent; border: none; color: var(--text-main); 
            font-size: 13px; resize: none; max-height: 80px; padding: 4px 0; outline: none;
        }
        .composer-input:disabled { cursor: not-allowed; }
        
        .btn-send { 
            width: 32px; height: 32px; border-radius: 50%; border: none; background: var(--accent); 
            color: white; cursor: pointer; font-size: 14px; transition: 0.2s; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .btn-send:hover:not(:disabled) { background: var(--success); transform: scale(1.05); }
        .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }

        /* --- Modal --- */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal-card { background: var(--bg-surface); border-radius: 16px; padding: 24px; width: 340px; border: 1px solid var(--success); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }

        .toast-container { position: fixed; bottom: 16px; right: 16px; display: flex; flex-direction: column; gap: 8px; z-index: 200; }
        .toast { background: var(--bg-elevated); border: 1px solid var(--success); border-left: 4px solid var(--success); border-radius: 8px; padding: 12px 16px; min-width: 240px; }
        .toast-content h4 { color: var(--success); font-size: 12px; font-weight: 700; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="context-menu" id="contextMenu"></div>

    <aside class="sidebar">
        <div class="header-brand">
            <div class="brand-icon" id="brandIconContainer"></div>
            <div class="brand-name">LocalShare</div>
        </div>

        <div class="self-device">
            <div>
                <div class="self-label">Local Device</div>
                <div class="self-name">
                    <span class="status-dot"></span>
                    <span id="uiSelfName">Studio Desktop</span>
                </div>
            </div>
            <button class="icon-btn" onclick="toggleModal('settingsModal', true)" title="System Preferences">
                <svg viewBox="0 0 400 300" style="width: 24px; height: 24px;">
                    <g class="gear-svg gear-spinning">
                        <circle cx="150" cy="150" r="40" fill="none" stroke="var(--success)" stroke-width="2" />
                        <path d="M150,90 L150,110 M150,190 L150,210 M90,150 L110,150 M190,150 L210,150 M108,108 L122,122 M178,178 L192,192 M108,192 L122,178 M178,108 L192,122" 
                              stroke="var(--success)" stroke-width="12" stroke-linecap="round" />
                        <circle cx="150" cy="150" r="25" fill="var(--bg-elevated)" stroke="var(--success)" stroke-width="2" />
                        <circle cx="150" cy="150" r="8" fill="var(--success)" />
                    </g>
                    <g class="gear-svg gear-spinning-reverse">
                        <circle cx="232" cy="150" r="20" fill="none" stroke="var(--text-muted)" stroke-width="2" />
                        <path d="M232,125 L232,135 M232,165 L232,175 M207,150 L217,150 M247,150 L257,150 M215,133 L222,140 M242,160 L249,167 M215,167 L222,160 M242,140 L249,133" 
                              stroke="var(--text-muted)" stroke-width="8" stroke-linecap="round" />
                        <circle cx="232" cy="150" r="12" fill="var(--bg-elevated)" stroke="var(--text-muted)" stroke-width="2" />
                        <circle cx="232" cy="150" r="4" fill="var(--text-muted)" />
                    </g>
                </svg>
            </button>
        </div>

        <div class="toolbar">
            <button class="btn-toolbar" id="btnScan" onclick="scanNetwork()">
                <span id="scanIcon">↻</span> <span>Scan Network</span>
            </button>
        </div>

        <div class="peer-list-container">
            <div class="section-header">Available Devices</div>
            <div class="peer-list" id="peerList"></div>
        </div>
    </aside>

    <main class="main-area">
        <header class="chat-header">
            <div class="chat-title-wrapper" id="activePeerHeader"></div>
            <div class="header-actions">
                <button class="icon-btn" id="btnCopyLast" onclick="copyLastMessage()" title="Copy Last Message">📋</button>
                <button class="icon-btn" onclick="clearChat()" title="Clear History">🗑️</button>
            </div>
        </header>

        <div class="chat-history" id="chatHistory"></div>

        <div class="composer">
            <div id="composerBox" class="composer-box">
                <input type="file" id="fileInput" hidden onchange="handleFileSelect(event)" accept="image/*,video/*">
                <button class="icon-btn" id="fileBtnContainer" onclick="document.getElementById('fileInput').click()" title="Attach File" style="width:28px; height:28px;"></button>
                <textarea class="composer-input" id="messageInput" placeholder="Type a message..." rows="1"></textarea>
                <button class="btn-send" id="btnSend" disabled>➤</button>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="settingsModal" onclick="if(event.target===this) toggleModal('settingsModal', false)">
        <div class="modal-card">
            <div class="modal-header">
                <h3 style="font-size: 14px; font-weight: 700; text-transform: uppercase;">Preferences</h3>
                <button class="icon-btn" onclick="toggleModal('settingsModal', false)">✕</button>
            </div>
            <div style="display: flex; flex-direction: column; gap: 16px;">
                <div>
                    <label style="display: block; font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px;">Device Name</label>
                    <input type="text" id="inputDeviceName" onchange="updateDeviceName(this.value)" style="width: 100%; padding: 8px 12px; background: var(--bg-base); border: 1px solid var(--border); border-radius: 6px; color: var(--text-main); font-size: 13px;">
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center; padding-top: 12px; border-top: 1px solid var(--border);">
                    <div style="font-size: 12px; font-weight: 600;">System Notifications</div>
                    <input type="checkbox" id="toggleNotify" onchange="updateNotifications(this.checked)" style="accent-color: var(--success); width: 16px; height: 16px;">
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        const poses = [
            { skull: "M100,30 C60,30 40,60 40,90 C40,110 50,120 55,145 C57,155 70,165 100,165 C130,165 143,155 145,145 C150,120 160,110 160,90 C160,60 140,30 100,30 Z", eyeL: "M65,85 C55,85 55,110 65,110 C75,110 85,100 80,85 Z", eyeR: "M135,85 C145,85 145,110 135,110 C125,110 115,100 120,85 Z" },
            { skull: "M100,45 C50,45 35,70 35,95 C35,115 50,125 55,145 C57,155 70,160 100,160 C130,160 143,155 145,145 C150,125 165,115 165,95 C165,70 150,45 100,45 Z", eyeL: "M70,90 C50,90 50,120 70,120 C85,120 90,110 85,90 Z", eyeR: "M130,90 C150,90 150,120 130,120 C115,120 110,110 115,90 Z" },
            { skull: "M110,35 C70,30 45,60 45,95 C45,115 45,130 55,150 C57,160 75,165 105,165 C135,165 150,155 150,140 C150,115 160,105 160,85 C160,55 145,40 110,35 Z", eyeL: "M75,90 C60,95 65,115 75,115 C85,115 90,105 85,90 Z", eyeR: "M130,85 C145,85 145,110 135,110 C125,110 115,100 125,85 Z" }
        ];

        function createSkullSVG() {
            const ns = "http://www.w3.org/2000/svg";
            const svg = document.createElementNS(ns, "svg");
            svg.setAttribute("viewBox", "0 0 200 200");
            svg.classList.add("skull-anim");
            const skull = document.createElementNS(ns, "path");
            skull.setAttribute("fill", "var(--skull-fill)");
            skull.setAttribute("stroke", "var(--outline-color)");
            skull.setAttribute("stroke-width", "6");
            skull.setAttribute("d", poses[0].skull);
            const l = document.createElementNS(ns, "path");
            l.setAttribute("fill", "var(--socket-color)");
            l.setAttribute("d", poses[0].eyeL);
            const r = document.createElementNS(ns, "path");
            r.setAttribute("fill", "var(--socket-color)");
            r.setAttribute("d", poses[0].eyeR);
            svg.append(skull, l, r);
            let idx = 0;
            setInterval(() => {
                if (!svg.isConnected) return;
                idx = (idx + 1) % poses.length;
                skull.setAttribute('d', poses[idx].skull);
                l.setAttribute('d', poses[idx].eyeL);
                r.setAttribute('d', poses[idx].eyeR);
            }, 2000 + Math.random() * 1000);
            return svg;
        }

        const state = { 
            selfName: "Studio Desktop", 
            theme: "dark", 
            notificationsEnabled: true, 
            activePeerId: 'demo-01', 
            isScanning: false, 
            peers: [{ id: 'demo-01', name: 'Network Gateway', ip: '192.168.1.1', color: '#107c10' }], 
            messages: { 'demo-01': [] } 
        };

        const els = { 
            peerList: document.getElementById('peerList'), 
            activeHeader: document.getElementById('activePeerHeader'), 
            chatHistory: document.getElementById('chatHistory'), 
            msgInput: document.getElementById('messageInput'), 
            btnSend: document.getElementById('btnSend'), 
            brandIcon: document.getElementById('brandIconContainer'), 
            fileBtn: document.getElementById('fileBtnContainer'), 
            toastContainer: document.getElementById('toastContainer'), 
            btnCopy: document.getElementById('btnCopyLast'), 
            composerBox: document.getElementById('composerBox') 
        };

        function init() {
            document.getElementById('inputDeviceName').value = state.selfName;
            document.getElementById('uiSelfName').textContent = state.selfName;
            document.getElementById('toggleNotify').checked = state.notificationsEnabled;
            els.brandIcon.append(createSkullSVG());
            els.fileBtn.append(createSkullSVG());
            setupEventListeners();
            renderApp();
            showToast("System Online", "Network connection established.", "💀");
        }

        function renderApp() {
            els.peerList.innerHTML = state.peers.length ? state.peers.map(p => `
                <div class="peer-item ${p.id === state.activePeerId ? 'active' : ''}" onclick="setActivePeer('${p.id}')">
                    <div class="peer-avatar" style="background: ${p.color}">${p.name[0]}</div>
                    <div class="peer-info"><div class="peer-name">${p.name}</div><div class="peer-ip">${p.ip}</div></div>
                </div>
            `).join('') : '<div style="text-align:center;color:var(--text-muted);padding:20px;font-size:11px;opacity:0.4;">No devices discovered. Click Scan.</div>';

            const peer = state.peers.find(p => p.id === state.activePeerId);
            els.activeHeader.innerHTML = peer ? `<div class="chat-title-text"><h2>${peer.name}</h2><span>LINKED • ${peer.ip}</span></div>` : '<h2>NO DEVICE SELECTED</h2>';
            
            if (!state.activePeerId) {
                els.chatHistory.innerHTML = '<div style="margin:auto;text-align:center;opacity:0.2;font-weight:800;font-size:11px;">SELECT A DEVICE TO BEGIN</div>';
                els.composerBox.classList.add('disabled');
                els.msgInput.disabled = true;
                els.btnCopy.disabled = true;
            } else {
                els.composerBox.classList.remove('disabled');
                els.msgInput.disabled = false;
                els.btnCopy.disabled = false;
                const msgs = state.messages[state.activePeerId] || [];
                els.chatHistory.innerHTML = msgs.length ? msgs.map(m => `
                    <div class="msg-bubble ${m.type}"><div class="msg-inner">
                        ${renderMessageContent(m)}
                        <div class="msg-meta">${m.time}</div>
                    </div></div>
                `).join('') : '<div style="margin:auto;text-align:center;opacity:0.2;font-size:11px;">EMPTY HISTORY</div>';
            }
            
            els.btnSend.disabled = !els.msgInput.value.trim() || !state.activePeerId;
            els.chatHistory.scrollTop = els.chatHistory.scrollHeight;
        }

        function renderMessageContent(m) {
            if (m.isMedia) {
                if (m.mediaType === 'image') {
                    return `
                        <img src="${m.mediaUrl}" class="media-preview image" onclick="window.open('${m.mediaUrl}')" alt="${m.fileName}">
                        <div class="msg-text">${m.fileName}</div>
                        <button onclick="triggerSaveFlow('${m.fileName}')" style="margin-top:8px;width:100%;padding:4px;border-radius:4px;border:none;background:var(--accent);color:#fff;font-size:9px;font-weight:800;cursor:pointer;">DOWNLOAD</button>
                    `;
                } else if (m.mediaType === 'video') {
                    return `
                        <video src="${m.mediaUrl}" class="media-preview video" controls></video>
                        <div class="msg-text">${m.fileName}</div>
                        <button onclick="triggerSaveFlow('${m.fileName}')" style="margin-top:8px;width:100%;padding:4px;border-radius:4px;border:none;background:var(--accent);color:#fff;font-size:9px;font-weight:800;cursor:pointer;">DOWNLOAD</button>
                    `;
                }
            }

            if (m.isFile) {
                return `
                    <div style="display:flex;gap:10px;align-items:center;"><span>💾</span><div><div>${m.fileName}</div><div style="font-size:9px;opacity:0.7;">${m.fileSize}</div></div></div>
                    <button onclick="triggerSaveFlow('${m.fileName}')" style="margin-top:6px;width:100%;padding:4px;border-radius:4px;border:none;background:var(--accent);color:#fff;font-size:9px;font-weight:800;cursor:pointer;">DOWNLOAD</button>
                `;
            }

            return `<div class="msg-text">${m.content}</div>`;
        }

        function setActivePeer(id) { state.activePeerId = id; renderApp(); }
        function getCurrentTime() { return new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false }); }

        function copyLastMessage() {
            const msgs = state.messages[state.activePeerId];
            if (!msgs || msgs.length === 0) {
                showToast("EMPTY BUFFER", "No content available to copy.", "💀");
                return;
            }
            
            const last = msgs[msgs.length - 1];
            const text = last.isFile ? last.fileName : last.content;
            
            const temp = document.createElement('textarea');
            temp.value = text;
            document.body.appendChild(temp);
            temp.select();
            document.execCommand('copy');
            document.body.removeChild(temp);
            
            els.btnCopy.classList.remove('animate-copy');
            void els.btnCopy.offsetWidth; 
            els.btnCopy.classList.add('animate-copy');
            
            showToast("COPIED", "Content saved to clipboard.", "📋");
        }

        function handleSendText() {
            const val = els.msgInput.value.trim();
            if (!val || !state.activePeerId) return;
            if (!state.messages[state.activePeerId]) state.messages[state.activePeerId] = [];
            state.messages[state.activePeerId].push({ type: 'sent', content: val, time: getCurrentTime() });
            els.msgInput.value = '';
            els.msgInput.style.height = 'auto';
            els.btnSend.disabled = true;
            renderApp();
            setTimeout(() => {
                if (state.activePeerId) {
                    state.messages[state.activePeerId].push({ type: 'received', content: "Packet received.", time: getCurrentTime() });
                    renderApp();
                }
            }, 800);
        }

        function scanNetwork() {
            if (state.isScanning) return;
            state.isScanning = true;
            document.getElementById('scanIcon').classList.add('spinning');
            setTimeout(() => {
                state.isScanning = false;
                document.getElementById('scanIcon').classList.remove('spinning');
                const id = 'p' + Date.now();
                state.peers.push({ id, name: 'Remote Client ' + (state.peers.length + 1), ip: '10.0.1.' + Math.floor(Math.random()*254), color: '#107c10' });
                state.messages[id] = [];
                showToast("DEVICE FOUND", "New node identified on network.", "💀");
                if (!state.activePeerId) state.activePeerId = id;
                renderApp();
            }, 1200);
        }

        function showToast(t, m, i) {
            if (!state.notificationsEnabled) return;
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<div style="display:flex;gap:10px;align-items:center;"><div>${i}</div><div class="toast-content"><h4>${t}</h4><p style="font-size:11px;opacity:0.7;">${m}</p></div></div>`;
            els.toastContainer.append(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (!file || !state.activePeerId) return;

            const isImage = file.type.startsWith('image/');
            const isVideo = file.type.startsWith('video/');
            const mediaUrl = (isImage || isVideo) ? URL.createObjectURL(file) : null;

            state.messages[state.activePeerId].push({ 
                type: 'sent', 
                isFile: true, 
                fileName: file.name, 
                fileSize: (file.size/1024).toFixed(1) + 'KB', 
                time: getCurrentTime(),
                isMedia: isImage || isVideo,
                mediaType: isImage ? 'image' : (isVideo ? 'video' : null),
                mediaUrl: mediaUrl
            });
            
            renderApp();
            showToast("DATA SENT", `Transmitting ${file.name}...`, "📤");
        }

        function triggerSaveFlow(filename) {
            showToast("DOWNLOAD", `Processing ${filename}...`, "💾");
        }

        function toggleModal(id, s) { document.getElementById(id).classList.toggle('active', s); }
        function updateDeviceName(v) { state.selfName = v; document.getElementById('uiSelfName').textContent = v; }
        function updateNotifications(s) { state.notificationsEnabled = s; }
        function clearChat() { if(state.activePeerId) { state.messages[state.activePeerId] = []; renderApp(); } }

        function setupEventListeners() {
            els.msgInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = this.scrollHeight + 'px';
                els.btnSend.disabled = !this.value.trim() || !state.activePeerId;
            });
            els.btnSend.addEventListener('click', handleSendText);
            els.msgInput.addEventListener('keydown', e => { if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); handleSendText(); }});
        }

        init();
    </script>
</body>
</html>
